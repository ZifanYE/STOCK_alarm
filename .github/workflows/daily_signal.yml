name: daily-signal

on:
   # schedule:
    # UTC 11:30 = 北京时间 19:30。
    # baostock 当日行情要 19:00 后才更新，15:15 跑库里还是昨天的。
    # cron 在整点前后是高峰，写 :30 避开，也给 baostock 留余量。
    #  - cron: '30 11 * * 1-5'

  workflow_dispatch:
    inputs:
      force:
        description: '忽略交易日判断（周末/节假日手动测试时勾上）'
        type: boolean
        default: true          # 手动跑基本都是测试，默认开

permissions:
  contents: write              # 没有这个，最后一步 git push 会 403

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ubuntu runner 默认没有中文字体，不装的话图片里的中文全是方框
      - name: Install CJK font
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}
          restore-keys: |
            market-db-

      - name: Show state
        run: |
          echo "北京时间: $(TZ=Asia/Shanghai date '+%F %T %A')"
          ls -lh data/ 2>/dev/null || echo "data/ 不存在（首次运行，会全量拉取）"

      - name: Run
        env:
          WECOM_HOOK: ${{ secrets.WECOM_HOOK }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python daily.py --force
          else
            python daily.py
          fi

      # 只在数据库真的存在时才存缓存，否则会刷 Path Validation Error
      - name: Save database
        if: ${{ hashFiles('data/market.db') != '' }}
        uses: actions/cache/save@v4
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}

      - name: Commit signals
        if: ${{ hashFiles('data/signals.json') != '' }}
        run: |
          git config user.name  "signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f data/signals.json
          git diff --staged --quiet || git commit -m "signals $(TZ=Asia/Shanghai date +%F)"
          git push || true
