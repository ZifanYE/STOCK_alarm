name: cron-test

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分钟，纯测试
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        run: |
          echo "触发事件: ${{ github.event_name }}"
          echo "分支: ${{ github.ref }}"
          echo "UTC 时间:    $(date -u '+%F %T')"
          echo "北京时间:    $(TZ=Asia/Shanghai date '+%F %T %A')"
